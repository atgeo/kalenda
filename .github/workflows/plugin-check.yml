name: Plugin Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: 'none'

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-dev \
            --no-progress \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build blocks
        run: npm run build

      - name: Prepare plugin directory
        run: |
          # Build outside the checked-out repo ($RUNNER_TEMP, not ./) so
          # rsync never scans the directory it's about to create into.
          mkdir -p "$RUNNER_TEMP/plugin-build/my-catholic-calendar"
          rsync -a --exclude-from=.distignore ./ "$RUNNER_TEMP/plugin-build/my-catholic-calendar/"

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '${{ runner.temp }}/plugin-build/my-catholic-calendar'
