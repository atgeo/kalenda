name: Build Release Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package'
        required: true
        type: string

  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: 'none'

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-dev \
            --no-progress \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build blocks
        run: npm run build

      - name: Prepare plugin directory
        run: |
          # Build outside the checked-out repo ($RUNNER_TEMP, not ./) so
          # rsync never scans the directory it's about to create into.
          mkdir -p "$RUNNER_TEMP/plugin-build/my-catholic-calendar"
          rsync -a --exclude-from=.distignore ./ "$RUNNER_TEMP/plugin-build/my-catholic-calendar/"
          cd "$RUNNER_TEMP/plugin-build"
          zip -r "$GITHUB_WORKSPACE/my-catholic-calendar.zip" my-catholic-calendar

      - name: List ZIP contents
        run: unzip -l my-catholic-calendar.zip

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v7
        with:
          name: my-catholic-calendar-${{ inputs.tag || github.ref_name }}
          path: my-catholic-calendar.zip
          retention-days: 14
          if-no-files-found: error
